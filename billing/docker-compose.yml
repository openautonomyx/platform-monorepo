services:
  billing-api:
    image: getlago/api:v1.44.0
    container_name: lago_api
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://lago:lago@billing-db:5432/billing
      REDIS_URL: redis://billing-redis:6379
      SECRET_KEY_BASE: lago_secret_key_base_openautonomyx_2026_random
      LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY:-}
      LAGO_ENCRYPTION_PRIMARY_KEY: lago_encryption_primary_openautonomyx2026
      LAGO_ENCRYPTION_DETERMINISTIC_KEY: lago_encryption_determ_openautonomyx2026
      LAGO_ENCRYPTION_KEY_DERIVATION_SALT: lago_derivation_salt_openautonomyx2026
      LAGO_API_URL: https://billing.openautonomyx.com
      LAGO_FRONT_URL: https://billing.openautonomyx.com
      LAGO_PDF_URL: http://billing-pdf:3000
      LAGO_SIDEKIQ_WEB: "true"
      LAGO_DISABLE_SIGNUP: "false"
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SENTRY_DSN: https://4d37b925306742c297fea10ec73bc15d@sentry.openautonomyx.com/1
      SENTRY_ENVIRONMENT: production
      LAGO_SMTP_ADDRESS: mail.openautonomyx.com
      LAGO_SMTP_PORT: "5870"
      LAGO_SMTP_USERNAME: noreply
      LAGO_SMTP_PASSWORD: Static@12
      LAGO_SMTP_FROM_EMAIL: noreply@openautonomyx.com
    depends_on:
      billing-db:
        condition: service_healthy
      billing-redis:
        condition: service_started

  billing-front:
    image: getlago/front:v1.44.0
    container_name: lago_front
    restart: unless-stopped
    ports:
      - "3101:80"
    environment:
      API_URL: https://billing.openautonomyx.com
      APP_ENV: production
      LAGO_DISABLE_SIGNUP: "false"
    depends_on:
      - billing-api

  billing-worker:
    image: getlago/api:v1.44.0
    container_name: lago_worker
    restart: unless-stopped
    command: ["./scripts/start.worker.sh"]
    environment:
      DATABASE_URL: postgresql://lago:lago@billing-db:5432/billing
      REDIS_URL: redis://billing-redis:6379
      SECRET_KEY_BASE: lago_secret_key_base_openautonomyx_2026_random
      LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY:-}
      LAGO_ENCRYPTION_PRIMARY_KEY: lago_encryption_primary_openautonomyx2026
      LAGO_ENCRYPTION_DETERMINISTIC_KEY: lago_encryption_determ_openautonomyx2026
      LAGO_ENCRYPTION_KEY_DERIVATION_SALT: lago_derivation_salt_openautonomyx2026
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      - billing-api

  billing-clock:
    image: getlago/api:v1.44.0
    container_name: lago_clock
    restart: unless-stopped
    command: ["./scripts/start.clock.sh"]
    environment:
      DATABASE_URL: postgresql://lago:lago@billing-db:5432/billing
      REDIS_URL: redis://billing-redis:6379
      SECRET_KEY_BASE: lago_secret_key_base_openautonomyx_2026_random
      LAGO_ENCRYPTION_PRIMARY_KEY: lago_encryption_primary_openautonomyx2026
      LAGO_ENCRYPTION_DETERMINISTIC_KEY: lago_encryption_determ_openautonomyx2026
      LAGO_ENCRYPTION_KEY_DERIVATION_SALT: lago_derivation_salt_openautonomyx2026
      RAILS_ENV: production
    depends_on:
      - billing-api

  billing-redis:
    image: redis:7-alpine
    container_name: lago_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]

  billing-pdf:
    image: getlago/lago-gotenberg:7.8.2
    container_name: lago_pdf
    restart: unless-stopped

  billing-db:
    image: getlago/postgres-partman:15.0-alpine
    container_name: lago_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lago
      POSTGRES_PASSWORD: lago
      POSTGRES_DB: billing
      PGDATA: /data/postgres
    volumes:
      - lago_db_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lago"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lago_db_data:
