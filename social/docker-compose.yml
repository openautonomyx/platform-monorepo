services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: unless-stopped
    ports:
      - "3360:5000"
    environment:
      DATABASE_URL: postgresql://postiz:postiz@shared_postgres:5432/postiz
      REDIS_URL: redis://shared_redis:6379/4
      JWT_SECRET: postiz_jwt_openautonomyx_2026
      NEXT_PUBLIC_BACKEND_URL: https://social.openautonomyx.com/api
      FRONTEND_URL: https://social.openautonomyx.com
      BACKEND_INTERNAL_URL: http://localhost:3000
    networks:
      - shared

networks:
  shared:
    external: true
    name: shared-infra_default
