##############################################################################
# Stalwart Mail Server — Coolify-ready (standalone, built-in admin auth)
#
# No required environment variables — deploys with sensible defaults.
# Admin credentials are auto-generated on first run (check docker logs).
#
# ── Optional — sensible defaults provided ────────────────────────────────
#   STALWART_IMAGE       – Docker image           (default: stalwartlabs/stalwart:latest)
#   STALWART_HOSTNAME    – Mail server hostname    (default: mail.example.com)
#   ADMIN_SECRET         – Admin password          (default: auto-generated, check docker logs)
#   TZ                   – Timezone                (default: UTC)
#
#   HTTPS_PORT           – HTTPS / Web admin port  (default: 4500)
#   HTTP_PORT            – HTTP / Admin API port    (default: 4501)
#   SMTP_PORT            – SMTP port               (default: 25)
#   SUBMISSION_PORT      – Submission port          (default: 5870)
#   SMTPS_PORT           – SMTPS port              (default: 465)
#   IMAP_PORT            – IMAP port               (default: 143)
#   IMAPS_PORT           – IMAPS port              (default: 993)
#   POP3_PORT            – POP3 port               (default: 110)
#   POP3S_PORT           – POP3S port              (default: 995)
#   MANAGESIEVE_PORT     – ManageSieve port        (default: 4190)
##############################################################################

services:
  mailserver:
    image: ${STALWART_IMAGE:-stalwartlabs/stalwart:latest}
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-4500}:443"             # Web admin / JMAP / REST API (HTTPS)
      - "${HTTP_PORT:-4501}:8080"             # HTTP Admin API (no TLS)
      - "${SMTP_PORT:-25}:25"                 # SMTP
      - "${SUBMISSION_PORT:-5870}:587"        # Submission (STARTTLS)
      - "${SMTPS_PORT:-465}:465"              # SMTPS (implicit TLS)
      - "${IMAP_PORT:-143}:143"               # IMAP
      - "${IMAPS_PORT:-993}:993"              # IMAPS (implicit TLS)
      - "${POP3_PORT:-110}:110"               # POP3
      - "${POP3S_PORT:-995}:995"              # POP3S (implicit TLS)
      - "${MANAGESIEVE_PORT:-4190}:4190"      # ManageSieve
    environment:
      - STALWART_HOSTNAME=${STALWART_HOSTNAME:-mail.example.com}
      - ADMIN_SECRET=${ADMIN_SECRET:-}
      - TZ=${TZ:-UTC}
    volumes:
      - stalwart_data:/opt/stalwart
      - /etc/letsencrypt:/etc/letsencrypt:ro
    # healthcheck disabled — re-enable once container is confirmed stable
    # healthcheck:
    #   test: ["CMD-SHELL", "nc -z localhost 25 || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    networks:
      - mail-network

volumes:
  stalwart_data:

networks:
  mail-network:
    driver: bridge
