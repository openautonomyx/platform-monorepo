version: '3.8'

services:
  liferay:
    image: liferay/dxp:7.4.3.u22
    container_name: autonomyx-lifera
    ports:
      - "8080:8080"
    environment:
      - LIFERAY_JVM_OPTS=-Xms2g -Xmx2g -Dfile.encoding=UTF-8
      - LIFERAY_PARENT_DIR=/opt/liferay
      - LIFERAY_OSGi_CONSOLE=true
      - LIFERAY_TOMCAT_PORT=8080
    volumes:
      - liferay_data:/opt/liferay/data
      - liferay_deploy:/opt/liferay/deploy
    networks:
      - autonomyx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5

  liferay-db:
    image: postgres:15
    container_name: autonomyx-lifera-db
    environment:
      - POSTGRES_DB:lifera
      - POSTGRES_USER:lifera
      - POSTGRES_PASSWORD:lifera123
    volumes:
      - liferay_db_data:/var/lib/postgresql/data
    networks:
      - autonomyx

  liferay-elasticsearch:
    image: elasticsearch:7.17.9
    container_name: autonomyx-lifera-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - liferay_es_data:/usr/share/elasticsearch/data
    networks:
      - autonomyx

volumes:
  liferay_data:
  liferay_deploy:
  liferay_db_data:
  liferay_es_data:

networks:
  autonomyx:
    name: autonomyx